<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alliance REN - Machine a Sous</title>
    <link rel="icon" type="image/png" href="assets/images/logo-ren.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header__inner">
            <div class="header__brand">
                <img class="header__logo" src="assets/images/logo-ren.png" alt="Logo Alliance REN">

            </div>

            <nav class="nav" id="nav">
                <div class="nav__menu" id="nav-menu">
                    <a href="index.html" class="nav__link" data-page="accueil">Accueil</a>
                    <a href="attaque.html" class="nav__link" data-page="attaque">Attaque</a>
                    <a href="defense.html" class="nav__link" data-page="defense">Defense</a>
                    <a href="classement.html" class="nav__link" data-page="classement">Classement</a>
                    <a href="historique.html" class="nav__link" data-page="historique">Historique</a>
                    <a href="membres.html" class="nav__link" data-page="membres">Membres</a>
                    <a href="builds.html" class="nav__link" data-page="builds">Builds</a>
                    <a href="liens.html" class="nav__link" data-page="liens">Liens</a>
                    <a href="board.html" class="nav__link" data-page="board">Board</a>
                    <a href="boutique.html" class="nav__link" data-page="boutique">Boutique</a>
                    <a href="jeux.html" class="nav__link nav__link--cta" data-page="jeux">Jeux</a>
                </div>
            </nav>

            <div class="header__user">
                <a href="admin.html" class="header__icon" id="nav-admin-link" title="Admin" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15v2m-6 4h12a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2zm10-10V7a4 4 0 0 0-8 0v4h8z"/></svg>
                </a>
                <span class="header__username" id="nav-username"></span>
                <button class="header__icon" id="btn-logout" title="Deconnexion">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
                <button class="nav__toggle" id="nav-toggle">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <main class="main main--slot">
        <div class="mb-lg">
            <h1 style="font-family: var(--font-title); font-size: 1.5rem; font-weight: 700; margin-bottom: var(--spacing-xs);">Machine a Sous du Dieu Enutrof</h1>
            <p class="text-muted" style="font-size: 0.8125rem;">Misez vos jetons et tentez de decrocher le jackpot</p>
        </div>

        <div class="slot-layout">

            <!-- Zone 3D -->
            <div class="slot-machine">
                <div class="slot-machine__canvas-wrap" id="slot-canvas-wrap">
                    <!-- Three.js canvas sera injecte ici -->
                </div>

                <!-- Ligne de resultat (symboles 2D fallback + affichage gain) -->
                <div class="slot-result" id="slot-result" style="display:none;">
                    <div class="slot-result__symbols" id="slot-result-symbols"></div>
                    <div class="slot-result__gain" id="slot-result-gain"></div>
                </div>

                <!-- Controles -->
                <div class="slot-controls">
                    <div class="slot-controls__mise">
                        <label class="form-label">Mise</label>
                        <div class="slot-mise-selector">
                            <button class="slot-mise-btn" id="mise-down">-</button>
                            <span class="slot-mise-value" id="mise-value">5</span>
                            <img class="icon-inline" src="assets/images/jeton.png" alt="jetons">
                            <button class="slot-mise-btn" id="mise-up">+</button>
                        </div>
                    </div>

                    <button class="btn btn--primary btn--cta slot-spin-btn" id="btn-spin">SPIN !</button>

                    <div class="slot-controls__solde">
                        <span class="text-muted">Solde :</span>
                        <span class="slot-solde" id="slot-solde">0</span>
                        <img class="icon-inline" src="assets/images/jeton.png" alt="jetons">
                    </div>
                </div>
            </div>

            <!-- Historique des tirages -->
            <div class="slot-history">
                <div class="slot-history__title">Derniers tirages</div>
                <div class="slot-history__list" id="slot-history-list">
                    <p class="text-muted text-center" style="padding:var(--spacing-md);">Aucun tirage pour le moment.</p>
                </div>
            </div>

        </div>

        <!-- Modal Jackpot -->
        <div class="modal-overlay" id="modal-jackpot">
            <div class="modal modal--jackpot">
                <div class="modal__header">
                    <h2 class="modal__title" id="jackpot-title">JACKPOT !</h2>
                    <button class="modal__close" id="jackpot-close">&times;</button>
                </div>
                <div class="modal__body" id="jackpot-body"></div>
            </div>
        </div>

        <!-- Confetti container -->
        <div class="confetti-container" id="confetti-container"></div>
    </main>

    <footer class="footer">
        <div class="footer__left">
            <span class="footer__members" id="footer-member-count">0 Membres</span>
        </div>
        <div class="footer__right">Developpe par <strong>Rorschach</strong></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="script.js"></script>
    <script src="js/slot.js"></script>
</body>
</html>
